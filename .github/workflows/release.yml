name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dbshuffle-linux-amd64   ./cmd
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dbshuffle-linux-arm64   ./cmd
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dbshuffle-darwin-amd64  ./cmd
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dbshuffle-darwin-arm64  ./cmd
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dbshuffle-windows-amd64.exe ./cmd

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          CHART_VERSION=${VERSION}
          # Stamp appVersion (the app image tag) and chart version
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/dbshuffle/Chart.yaml
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" helm/dbshuffle/Chart.yaml
          # Pin the default image tag in values.yaml to this release
          sed -i "s/^  tag:.*/  tag: \"${VERSION}\"/" helm/dbshuffle/values.yaml
          helm package helm/dbshuffle --destination dist/

      - name: Attach Helm chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz

      - name: Push Helm chart to OCI registry
        run: |
          helm push dist/dbshuffle-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
